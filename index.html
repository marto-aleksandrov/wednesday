<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>За теб ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#140b26;
    --night2:#241240;
    --rose:#ff5c8a;
    --peach:#ffb4a2;
    --blush:#ffd9e3;
    --glow:rgba(255,92,138,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Manrope',sans-serif;
    background:radial-gradient(120% 90% at 50% 110%, #3a1a52 0%, var(--night2) 45%, var(--night) 100%);
    color:var(--blush);
    display:flex;align-items:center;justify-content:center;
    text-align:center;
    touch-action:manipulation;
    user-select:none;-webkit-user-select:none;
  }
 
  /* ---------- stars ---------- */
  .star{position:fixed;border-radius:50%;background:#fff;opacity:.7;animation:twinkle 3s infinite ease-in-out;pointer-events:none;z-index:0}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.8;transform:scale(1)}}

  /* ---------- floating hearts bg ---------- */
  .bg-heart{position:fixed;bottom:-40px;pointer-events:none;z-index:0;animation:floatUp linear forwards}
  @keyframes floatUp{
    0%{transform:translateY(0) rotate(0deg);opacity:0}
    10%{opacity:.5}
    100%{transform:translateY(-110vh) rotate(40deg);opacity:0}
  }

  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;z-index:2;transition:opacity .6s ease, transform .6s ease}
  .hidden{opacity:0;pointer-events:none;transform:translateY(14px)}

  /* ---------- screen 1: heart ---------- */
  .big-heart{
    font-size:96px;line-height:1;cursor:pointer;border:none;background:none;
    filter:drop-shadow(0 0 28px var(--glow));
    animation:beat 1.2s infinite ease-in-out;
    transition:transform .2s;
  }
  .big-heart:active{transform:scale(.85)}
  @keyframes beat{
    0%,100%{transform:scale(1)}
    14%{transform:scale(1.14)}
    28%{transform:scale(1)}
    42%{transform:scale(1.14)}
    56%{transform:scale(1)}
  }
  .hint{margin-top:26px;font-size:15px;letter-spacing:.14em;text-transform:uppercase;opacity:.75;animation:pulseHint 2.4s infinite}
  @keyframes pulseHint{0%,100%{opacity:.4}50%{opacity:.9}}

  /* ---------- screen 2: messages ---------- */
  .msg{
    font-family:'Playfair Display',serif;
    font-size:clamp(26px,7vw,40px);
    font-weight:600;font-style:italic;
    line-height:1.35;max-width:22ch;
    min-height:4.2em;
    text-shadow:0 0 30px rgba(255,92,138,.25);
  }
  .cursor{display:inline-block;width:2px;height:1em;background:var(--rose);margin-left:3px;vertical-align:-2px;animation:blink .8s infinite}
  @keyframes blink{50%{opacity:0}}
  .tap-next{
    margin-top:38px;border:1.5px solid rgba(255,217,227,.35);background:rgba(255,255,255,.04);
    color:var(--blush);font-family:'Manrope';font-weight:600;font-size:15px;letter-spacing:.05em;
    padding:14px 34px;border-radius:999px;cursor:pointer;
    backdrop-filter:blur(4px);
    transition:opacity .4s, transform .2s;
  }
  .tap-next:active{transform:scale(.94)}
  .tap-next.invisible{opacity:0;pointer-events:none}
  .progress{position:absolute;bottom:34px;display:flex;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,217,227,.25);transition:background .3s, transform .3s}
  .dot.on{background:var(--rose);transform:scale(1.25);box-shadow:0 0 10px var(--glow)}

  /* ---------- screen 3: question ---------- */
  .question{font-family:'Playfair Display',serif;font-size:clamp(30px,8vw,46px);font-weight:600;line-height:1.3;max-width:16ch}
  .question em{color:var(--rose);font-style:italic}
  .btn-row{margin-top:46px;display:flex;gap:20px;align-items:center;justify-content:center;min-height:80px}
  .btn{
    font-family:'Manrope';font-weight:800;border:none;border-radius:999px;cursor:pointer;
    padding:16px 40px;font-size:20px;transition:transform .15s;
  }
  #yesBtn{
    background:linear-gradient(135deg,var(--rose),#ff8fb0);color:#fff;
    box-shadow:0 6px 30px var(--glow);
  }
  #yesBtn:active{transform:scale(.93)}
  #noBtn{
    background:rgba(255,255,255,.08);color:var(--blush);
    border:1.5px solid rgba(255,217,227,.3);
    position:fixed; /* becomes fixed once it starts running */
    transition:left .25s cubic-bezier(.34,1.56,.64,1), top .25s cubic-bezier(.34,1.56,.64,1), transform .2s;
    z-index:5;white-space:nowrap;
  }
  #noBtn.docked{position:static}
  .taunt{margin-top:22px;font-size:15px;opacity:0;color:var(--peach);transition:opacity .4s;min-height:1.4em}
  .taunt.show{opacity:.9}

  /* ---------- screen 4: yes! ---------- */
  .final-title{font-family:'Playfair Display',serif;font-size:clamp(34px,9vw,52px);font-weight:600;line-height:1.25}
  .final-sub{margin-top:18px;font-size:18px;opacity:.9;max-width:26ch;line-height:1.5}
  .date-card{
    margin-top:34px;padding:20px 34px;border-radius:22px;
    background:rgba(255,255,255,.06);border:1.5px solid rgba(255,92,138,.4);
    backdrop-filter:blur(6px);
    box-shadow:0 0 40px rgba(255,92,138,.2);
  }
  .date-card .day{font-family:'Playfair Display',serif;font-size:28px;color:var(--rose)}
  .date-card .note{margin-top:6px;font-size:14px;opacity:.75;letter-spacing:.08em;text-transform:uppercase}

  /* confetti hearts */
  .confetti{position:fixed;top:-30px;pointer-events:none;z-index:10;animation:fall linear forwards}
  @keyframes fall{
    to{transform:translateY(115vh) rotate(360deg);opacity:.9}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
  
<!-- SCREEN 1 : start -->
<section class="screen" id="s1">
  <button class="big-heart" id="startHeart" aria-label="Старт">❤️</button>
  <div class="hint">Натисни сърцето</div>
</section>

<!-- SCREEN 2 : messages -->
<section class="screen hidden" id="s2">
  <p class="msg"><span id="msgText"></span><span class="cursor" id="cursor"></span></p>
  <button class="tap-next invisible" id="nextBtn">Продължи →</button>
  <div class="progress" id="dots"></div>
</section>

<!-- SCREEN 3 : question -->
<section class="screen hidden" id="s3">
  <h1 class="question">Заедно, <em>тази сряда</em>? 🥺</h1>
  <div class="btn-row">
    <button class="btn" id="yesBtn">Да ❤️</button>
    <button class="btn docked" id="noBtn">Не</button>
  </div>
  <div class="taunt" id="taunt"></div>
</section>

<!-- SCREEN 4 : final -->
<section class="screen hidden" id="s4">
  <h1 class="final-title">Брао еее! 🎉</h1>
  <p class="final-sub">Знаех си, че ще кажеш „да“. Вече броя часовете… ❤️</p>
  <div class="date-card">
    <div class="day">Сряда 😘</div>
    <div class="note">Кажала си</div>
  </div>
</section>

<script>
/* ---------- ambient stars ---------- */
for(let i=0;i<40;i++){
  const s=document.createElement('div');
  s.className='star';
  const size=Math.random()*2.4+1;
  s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}
/* ---------- floating hearts ---------- */
const heartChars=['💗','💕','💖','❤️'];
setInterval(()=>{
  if(document.hidden)return;
  const h=document.createElement('div');
  h.className='bg-heart';
  h.textContent=heartChars[Math.floor(Math.random()*heartChars.length)];
  h.style.cssText=`left:${Math.random()*95}vw;font-size:${Math.random()*16+12}px;animation-duration:${Math.random()*6+7}s;opacity:.5`;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),14000);
},900);

const $=id=>document.getElementById(id);
const show=(hide,showEl)=>{ $(hide).classList.add('hidden'); $(showEl).classList.remove('hidden'); };

/* ---------- messages flow ---------- */
const messages=[
  "Дарина, \nмина доста време…",
  "И много ми липсваш 💭",
  "Знаеш, че всеки път,\nкогато си говорим по телефона,\nпросто полудявам 📞",
  "Защото ме боли, че...\n съм толкова далеч от теб…",
  "Затоваа, би ли ми помогнала\nда поправим това? 👀"
];
let idx=0;
const dotsWrap=$('dots');
messages.forEach(()=>{const d=document.createElement('div');d.className='dot';dotsWrap.appendChild(d);});
const dots=[...dotsWrap.children];

function typeMessage(text,done){
  const el=$('msgText');
  el.textContent='';
  $('nextBtn').classList.add('invisible');
  let i=0;
  const chars=[...text];
  (function tick(){
    if(i<chars.length){
      el.textContent+= chars[i]==='\n' ? '\n' : chars[i];
      el.innerHTML=el.textContent.replace(/\n/g,'<br>');
      i++;
      setTimeout(tick, chars[i-1]==='…'?260:38);
    } else done();
  })();
}
function playMessage(){
  dots.forEach((d,i)=>d.classList.toggle('on',i===idx));
  typeMessage(messages[idx],()=>{
    $('nextBtn').classList.remove('invisible');
    $('nextBtn').textContent = idx===messages.length-1 ? 'Кажи ми… 💬' : 'Продължи →';
  });
}
$('startHeart').addEventListener('click',()=>{
  if(navigator.vibrate)navigator.vibrate(30);
  show('s1','s2');
  setTimeout(playMessage,500);
});
$('nextBtn').addEventListener('click',()=>{
  if(navigator.vibrate)navigator.vibrate(15);
  idx++;
  if(idx<messages.length){ playMessage(); }
  else { show('s2','s3'); }
});

/* ---------- runaway NO button ---------- */
const noBtn=$('noBtn');
const yesBtn=$('yesBtn');
const taunts=["Не? Сериозно? 💔","Таа па ей","Ки вийш ти 🙄","Вселената иска да ѝ върнеш жеста 😄","Аре ма... знаеш отговора 🥺","Само „Да“ работи тук 😘"];
let escapes=0;

function runAway(){
  escapes++;
  if(navigator.vibrate)navigator.vibrate(10);
  // undock on first attempt
  if(noBtn.classList.contains('docked')){
    const r=noBtn.getBoundingClientRect();
    noBtn.classList.remove('docked');
    noBtn.style.left=r.left+'px';
    noBtn.style.top=r.top+'px';
  }
  const bw=noBtn.offsetWidth, bh=noBtn.offsetHeight;
  const pad=16;
  const maxX=window.innerWidth-bw-pad, maxY=window.innerHeight-bh-pad;
  let x,y;
  const cur=noBtn.getBoundingClientRect();
  do{
    x=pad+Math.random()*(maxX-pad);
    y=pad+Math.random()*(maxY-pad);
  }while(Math.hypot(x-cur.left,y-cur.top)<160); // jump far enough
  noBtn.style.left=x+'px';
  noBtn.style.top=y+'px';

  // no shrinks, yes grows
  const shrink=Math.max(.45,1-escapes*.09);
  noBtn.style.transform=`scale(${shrink})`;
  const grow=Math.min(1.5,1+escapes*.07);
  yesBtn.style.transform=`scale(${grow})`;

  const t=$('taunt');
  t.textContent=taunts[Math.min(escapes-1,taunts.length-1)];
  t.classList.add('show');

  if(escapes>=6){ noBtn.textContent='Добре де… „Да“ 🙃'; }
  if(escapes>=9){ noBtn.style.opacity='0'; noBtn.style.pointerEvents='none';
    t.textContent='Бутонът „Не“ се предаде. Остана само едното… 😇';
  }
}
/* dodge before the tap even lands */
['pointerdown','touchstart','mouseenter'].forEach(ev=>{
  noBtn.addEventListener(ev,e=>{e.preventDefault();runAway();},{passive:false});
});
noBtn.addEventListener('click',e=>e.preventDefault());

/* ---------- YES ---------- */
yesBtn.addEventListener('click',()=>{
  if(navigator.vibrate)navigator.vibrate([30,50,30]);
  noBtn.remove();
  show('s3','s4');
  burst();
  setTimeout(burst,700);
  setTimeout(burst,1500);
});
function burst(){
  const chars=['❤️','💖','💘','💕','✨','💗'];
  for(let i=0;i<34;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.textContent=chars[Math.floor(Math.random()*chars.length)];
    c.style.cssText=`left:${Math.random()*100}vw;font-size:${Math.random()*20+14}px;animation-duration:${Math.random()*2+2.2}s;animation-delay:${Math.random()*.4}s`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}
</script>
</body>
</html>
