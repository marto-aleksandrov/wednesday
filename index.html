<!DOCTYPE html>
<html lang="bg">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{


height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#ffb75e,#ed8f03,#8e54e9);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

color:white;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

#particles{

position:fixed;
width:100%;
height:100%;
pointer-events:none;

overflow:hidden;

}

.blob{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.12);

animation:float linear infinite;

}

@keyframes float{

from{

transform:translateY(120vh) scale(.5);

}

to{

transform:translateY(-20vh) scale(1.2);

}

}

.card{

width:92%;
max-width:420px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:28px;

padding:35px 25px;

text-align:center;

box-shadow:0 25px 50px rgba(0,0,0,.25);

z-index:5;

}

#heart{

font-size:90px;

cursor:pointer;

display:inline-block;

animation:pulse 1.3s infinite;

user-select:none;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.18);}
100%{transform:scale(1);}

}

.small{

margin-top:18px;

opacity:.9;

font-size:18px;

}

.hidden{

display:none;

}

#message{

font-size:30px;

font-weight:600;

min-height:170px;

line-height:1.45;

display:flex;
justify-content:center;
align-items:center;

}

.progress{

margin-top:20px;

font-size:26px;

letter-spacing:6px;

opacity:.75;

}

.buttons{

margin-top:35px;

height:120px;

position:relative;

}

button{

border:none;

padding:16px 32px;

border-radius:50px;

font-size:20px;

font-weight:600;

cursor:pointer;

transition:.25s;

}

#yes{

background:white;

color:#7a35ff;

box-shadow:0 8px 20px rgba(0,0,0,.2);

}

#yes:hover{

transform:scale(1.08);

}

#no{

position:absolute;

background:#ff6464;

color:white;

left:60%;
top:0;

}

.success{

font-size:28px;

line-height:1.6;

animation:pop .6s;

}

@keyframes pop{

from{

opacity:0;
transform:scale(.6);

}

to{

opacity:1;
transform:scale(1);

}

}

.confetti{

position:fixed;

width:10px;
height:18px;

top:-30px;

animation:fall linear forwards;

}

@keyframes fall{

to{

transform:translateY(120vh) rotate(720deg);

}

}

</style>

</head>

<body>

<div id="particles"></div>

<div class="card">

<div id="start">

<div id="heart">❤️</div>

<div class="small">

Докосни сърцето, за да започнеш...

</div>

</div>

<div id="story" class="hidden">

<div id="message"></div>

<div class="progress" id="progress"></div>

<div class="buttons hidden" id="buttons">

<button id="yes">❤️ Да</button>

<button id="no">Не 🙈</button>

</div>

</div>

</div>
<script>

const messages = [

"Дарина, мина доста време...",

"И ужасно ми липсваш.",

"Знаеш че...",

"Всеки път когато си говорим по телефона...",

"Направо полудявам.",

"Защото съм далеч от теб.",

"Та...",

"Ще ми помогнеш ли да поправим това?",

"Тази сряда? ❤️"

];

let current = 0;

const start = document.getElementById("start");
const story = document.getElementById("story");
const heart = document.getElementById("heart");
const message = document.getElementById("message");
const progress = document.getElementById("progress");
const buttons = document.getElementById("buttons");

function typeText(text){

message.innerHTML="";

let i=0;

const interval=setInterval(()=>{

message.innerHTML+=text.charAt(i);

i++;

if(i>=text.length){

clearInterval(interval);

}

},35);

}

function updateProgress(){

let html="";

for(let i=0;i<messages.length;i++){

if(i<=current){

html+="❤️ ";

}else{

html+="🤍 ";

}

}

progress.innerHTML=html;

}

function showMessage(){

typeText(messages[current]);

updateProgress();

if(current===messages.length-1){

setTimeout(()=>{

buttons.classList.remove("hidden");

},900);

}

}

heart.onclick=()=>{

start.classList.add("hidden");

story.classList.remove("hidden");

showMessage();

};

document.addEventListener("click",(e)=>{

if(start.classList.contains("hidden")==false)return;

if(buttons.contains(e.target))return;

if(current>=messages.length-1)return;

current++;

showMessage();

});

function createBlob(){

const blob=document.createElement("div");

blob.className="blob";

const size=Math.random()*80+20;

blob.style.width=size+"px";

blob.style.height=size+"px";

blob.style.left=Math.random()*100+"vw";

blob.style.animationDuration=(Math.random()*10+10)+"s";

document.getElementById("particles").appendChild(blob);

setTimeout(()=>{

blob.remove();

},20000);

}

setInterval(createBlob,700);

for(let i=0;i<12;i++){

setTimeout(createBlob,i*200);

}

</script>
  <script>

const no = document.getElementById("no");
const yes = document.getElementById("yes");

const funnyTexts = [

"Не 🙈",
"Сигурна ли си? 🤔",
"Помисли пак 😄",
"Хмм... 😅",
"Почти 😂",
"Не става 🤭",
"Хаха 😜",
"Няма шанс 😎"

];

let tries = 0;

function moveNo(){

const area = document.getElementById("buttons");

const maxX = area.clientWidth - no.offsetWidth;
const maxY = area.clientHeight - no.offsetHeight;

const x = Math.random() * maxX;
const y = Math.random() * maxY;

no.style.left = x + "px";
no.style.top = y + "px";

no.innerHTML = funnyTexts[tries % funnyTexts.length];

tries++;

yes.style.transform =
`scale(${1 + tries*0.05})`;

if(navigator.vibrate){
navigator.vibrate(30);
}

}

no.addEventListener("mouseenter",moveNo);
no.addEventListener("touchstart",function(e){

e.preventDefault();

moveNo();

},{passive:false});

no.addEventListener("click",moveNo);

function confetti(){

for(let i=0;i<140;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
`hsl(${Math.random()*360},90%,60%)`;

c.style.animationDuration=
(Math.random()*2+2)+"s";

c.style.transform=
`rotate(${Math.random()*360}deg)`;

document.body.appendChild(c);

setTimeout(()=>{

c.remove();

},4500);

}

}

yes.onclick=function(){

confetti();

if(navigator.vibrate){

navigator.vibrate([100,60,100]);

}

document.querySelector(".card").innerHTML=`

<div class="success">

<div style="font-size:70px;margin-bottom:15px;">
🥹❤️
</div>

<div style="font-size:34px;font-weight:700;">
ЙЕЕЕЕ!
</div>

<br>

Много се радвам. ❤️

<br><br>

Нямам търпение
да те видя.

<br><br>

🥰

</div>

`;

};

</script>

</body>
</html>
